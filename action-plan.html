<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>實戰方案</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="action-plan">

<header>
  <div class="container navbar">
    <a class="brand" href="index.html">從種子到杯中，減碳在手中</a>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">首頁</a>
      <a href="why-carbon.html">為什麼要減碳</a>
      <a href="carbon-elements.html">碳排元素</a>
      <a href="carbon-basics.html">基礎知識</a>
      <a href="action-plan.html">實戰方案</a>
      <a href="checklist.html">行動清單</a>
      <a href="about.html">教材介紹</a>
    </nav>
  </div>
</header>

<main class="section">
  <div class="container">
    <div class="section-title reveal">
      <h2>單元 4：實戰方案</h2>
      <p>先選一個情境，再一步一步看會發生哪些事。</p>
    </div>

    <div id="scenarioSelectorCard" class="card reveal">
      <h3>先選一個情境</h3>
      <p>不同商品，背後面對的原料、設備、包材與碳排選擇也不一樣。</p>

      <div class="choice-list">
        <button class="choice-btn" onclick="chooseScenario('hot_latte')">我做熱拿鐵</button>
        <button class="choice-btn" onclick="chooseScenario('iced_latte')">我想做冰拿鐵</button>
        <button class="choice-btn" onclick="chooseScenario('hot_americano')">我想做熱美式</button>
        <button class="choice-btn" onclick="chooseScenario('iced_americano')">我想做冰美式</button>
        <button class="choice-btn" onclick="chooseScenario('delivery')">我想看一筆外送訂單會發生哪些事</button>
      </div>
    </div>

    <div id="planScenarioCard" class="card reveal" style="display:none;">
      <div class="section-title">
        <div>
          <h2 id="planScenarioTitle">情境標題</h2>
          <p id="planScenarioDesc">情境說明</p>
        </div>
        <div class="small-note" id="planStepCounter">步驟 1 / 5</div>
      </div>

      <div id="planStepCard" class="summary-box" style="margin-bottom:16px;">
        請先選擇情境。
      </div>

      <div id="planSelectionSummary" class="small-note" style="margin-bottom:16px;">
        尚未選擇
      </div>

      <div id="planResultPage" class="summary-box" style="display:none; margin-bottom:16px;"></div>

      <div class="hero-actions">
        <button id="planBackBtn" class="btn btn-secondary" onclick="goPrevPlanStep()" style="display:none;">上一步</button>
        <button id="planNextBtn" class="btn btn-primary" onclick="goNextPlanStep()" style="display:none;">下一步</button>
        <button id="planRestartBtn" class="btn btn-secondary" onclick="resetPlanScenario()">重新開始</button>
        <button class="btn btn-secondary" onclick="backToScenarioSelect()">返回情境選擇</button>
      </div>
    </div>

    <div class="hero-actions">
      <a class="btn btn-primary" href="checklist.html">下一頁：行動清單</a>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p><strong>從種子到杯中，減碳在手中</strong></p>
    <p>給咖啡廳管理層的互動式碳排學習平台。</p>
    <p>本網站有使用 ChatGPT 工具製作。</p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
